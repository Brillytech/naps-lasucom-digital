<html lang="en">
  <head>

    <meta name="mobile-web-app-capable" content="yes" />

      content="Official digital connect platform for NAPS LASUCOM. Access announcements, resources, requests and official student updates."

    <!-- Browser Address Color -->

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "NAPS LASUCOM",
        "alternateName": "Nigeria Association of Physiotherapy Students LASUCOM",
        "url": "https://naps-lasucom-digital.vercel.app",
        "logo": "https://naps-lasucom-digital.vercel.app/images/naps-logo.png",
        "description": "Official digital connect platform for NAPS LASUCOM."
      }
    </script>

    <style>

#app-splash{

position:fixed;
inset:0;
z-index:99999;

display:grid;
place-items:center;

background:
radial-gradient(circle at top right,#0b5cff33,transparent 35%),
radial-gradient(circle at bottom left,#22a44722,transparent 35%),
linear-gradient(160deg,#020617,#062b63,#03152f);

transition:opacity .4s ease;

}

.glass{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

width:100%;
height:100%;

}

#splash-logo{

width:120px;
height:120px;
object-fit:contain;

filter:
drop-shadow(0 0 15px rgba(90,170,255,.25))
drop-shadow(0 0 35px rgba(90,170,255,.18));

}

#app-splash.show #splash-logo{

transform:scale(1.02);

filter:

drop-shadow(0 0 20px rgba(82,156,255,.45))

drop-shadow(0 18px 35px rgba(0,0,0,.35));

}

#splash-extra{

opacity:0;

transform:translateY(8px);

transition:

opacity .45s ease,

transform .45s ease;

display:flex;

flex-direction:column;

align-items:center;

margin-top:22px;

}

#app-splash.show #splash-extra{

opacity:1;

transform:none;

}

#splash-extra h1{

margin:0;

font-size:28px;

font-weight:900;

letter-spacing:-.6px;

color:white;

}

#splash-extra p{

margin-top:5px;

color:#9fd0ff;

font-size:16px;

font-weight:700;

}

.loader{

margin-top:18px;

width:88px;

height:5px;

background:rgba(255,255,255,.12);

border-radius:999px;

overflow:hidden;

}

.loader span{

display:block;

width:42%;

height:100%;

background:

linear-gradient(

90deg,

#4da3ff,

#22a447

);

animation:loader 1s infinite;

}

#splash-extra small{

margin-top:18px;

font-size:10px;

font-weight:600;

letter-spacing:.5px;

text-transform:uppercase;

color:rgba(255,255,255,.45);

}

@keyframes loader{

0%{

transform:translateX(-100%);

}

100%{

transform:translateX(250%);

}

}

</style>
  </head>

 <body>

<div id="app-splash">

    <div class="glass">

        <img
    id="splash-logo"
    src="/images/naps-logo-transparent.png"
    alt="NAPS LASUCOM"
/>

        <div id="splash-extra">

            <h1>NAPS LASUCOM</h1>

            <p>Digital Connect</p>

            <div class="loader">
                <span></span>
            </div>

            <small>
                Powered by BrillyTech Networks
            </small>

        </div>

    </div>

</div>

<div id="root"></div>

<script type="module" src="/src/main.jsx"></script>

</body>
</html>
